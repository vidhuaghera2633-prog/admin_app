name: techserve_admin
description: TechServe Admin Dashboard - Field Service Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  async: ^2.11.0
  go_router: ^14.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.4
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true