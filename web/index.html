  <script>
    function playNotificationSound() {
      try {
        var context = new (window.AudioContext || window.webkitAudioContext)();
        if (context.state === 'suspended') {
          context.resume();
        }
        var osc = context.createOscillator();
        var gain = context.createGain();
        
        // Beautiful modern dual-tone electronic synthesizer chime
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, context.currentTime); // D5
        osc.frequency.exponentialRampToValueAtTime(880.00, context.currentTime + 0.12); // A5
        
        gain.gain.setValueAtTime(0.2, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.5);
        
        osc.connect(gain);
        gain.connect(context.destination);
        
        osc.start();
        osc.stop(context.currentTime + 0.5);
      } catch (e) {
        console.warn('AudioContext failed:', e);
      }
    }
    // Request notification permission (returns a Promise)
    function requestNotificationPermission() {
      try {
        if (!('Notification' in window)) return 'unsupported';
        return Notification.requestPermission();
      } catch (e) {
        console.warn('Notification permission request failed', e);
        return 'denied';
      }
    }

    // Show a browser native notification. `options` should be a plain object compatible with the Notification API.
    function showBrowserNotification(title, options) {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'granted') {
          var n = new Notification(title, options || {});
          n.onclick = function (ev) {
            try {
              window.focus();
              if (options && options.data && options.data.url) {
                window.location.href = options.data.url;
              }
            } catch (e) {}
          };
        }
      } catch (e) {
        console.warn('showBrowserNotification failed', e);
      }
    }
  </script>
